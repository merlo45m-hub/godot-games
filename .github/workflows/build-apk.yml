name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  export-android:
    runs-on: ubuntu-latest
    name: Export Android APK
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot Headless
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip -q Godot_v4.4-stable_linux.x86_64.zip
          chmod +x Godot_v4.4-stable_linux.x86_64
          mv Godot_v4.4-stable_linux.x86_64 /usr/local/bin/godot
          godot --version

      - name: Download Android Export Templates
        run: |
          mkdir -p ~/.godot/export_templates
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
          unzip -q Godot_v4.4-stable_export_templates.tpz -d ~/.godot/export_templates/
          mv ~/.godot/export_templates/templates/* ~/.godot/export_templates/
          rm -rf ~/.godot/export_templates/templates
          ls ~/.godot/export_templates/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create Builds Directory
        run: mkdir -p builds

      - name: Export Android APK (Debug)
        id: export
        continue-on-error: true
        run: |
          godot --headless --export-debug "Android" builds/agent007-debug.apk 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Export Android APK (Release)
        if: steps.export.outcome == 'success'
        run: |
          godot --headless --export-release "Android" builds/agent007-release.apk 2>&1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: builds/*.apk
          if-no-files-found: error

      - name: List Build Output
        run: ls -lh builds/