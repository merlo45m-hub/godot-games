name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker p4a
        run: |
          mkdir -p builds
          docker run --rm \
            -v $PWD:/app \
            -v $PWD/builds:/output \
            kivy/python-for-android \
            p4a apk \
              --private /app/agent007 \
              --package "com.nousresearch.agent007" \
              --name "Agent 007" \
              --version 0.1.0 \
              --bootstrap sdl2 \
              --requirements python3,sdl2,numpy \
              --arch arm64-v8a \
              --permission VIBRATE \
              --window \
              --dist-name agent007 \
              --output /output 2>&1 | tail -20
          echo "--- CHECK OUTPUT ---"
          find . -name "*.apk" 2>/dev/null
          ls -la builds/

      - uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: builds/*.apk
          if-no-files-found: warn