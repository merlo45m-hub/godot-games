name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64
          echo "BIN=$(ls Godot_v*_linux.x86_64)" >> $GITHUB_ENV

      - name: Export templates
        run: |
          mkdir -p ~/.godot/export_templates/4.2-stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_export_templates.tpz -O t.tpz
          unzip -q t.tpz -d t && mv t/templates/* ~/.godot/export_templates/4.2-stable/

      - uses: android-actions/setup-android@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Export APK and upload as artifact
        run: |
          ./Godot_v4.2-stable_linux.x86_64 --headless --export-debug "Android" builds/agent007.apk 2>&1
          echo "EXIT=$?"
          echo "=== LOOKING FOR APK ==="
          find /home/runner/work -name "*.apk" 2>/dev/null | head -20
          find . -name "*.apk" 2>/dev/null | head -20
          echo "=== GRADLE BUILDS ==="
          find . -path "*/android-gradle-project/*" -name "*.apk" 2>/dev/null | head -10
          echo "=== BUILDS DIR ==="
          ls -la builds/ 2>/dev/null
          # If APK exists in Gradle output, copy it
          GRADLE_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$GRADLE_APK" ]; then
            echo "Found APK at: $GRADLE_APK"
            cp "$GRADLE_APK" builds/agent007.apk
          fi
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: builds/*.apk
          if-no-files-found: error

      - run: ls -lah builds/