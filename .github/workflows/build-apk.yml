name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -qO godot.zip https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip -qo godot.zip
          chmod +x Godot_v4.2-stable_linux.x86_64
          sudo mv Godot_v4.2-stable_linux.x86_64 /usr/local/bin/godot
          godot --version

      - name: Export Templates
        run: |
          mkdir -p $HOME/.godot/export_templates/4.2-stable
          wget -qO templates.tpz https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_export_templates.tpz
          unzip -qo templates.tpz -d t
          mv t/templates/* $HOME/.godot/export_templates/4.2-stable/

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Export APK
        run: |
          mkdir -p builds
          echo "=== PROJECT STRUCTURE ==="
          ls -la
          echo ""
          echo "=== PROJECT.GODOT ==="
          cat project.godot
          echo ""
          echo "=== EXPORT PRESETS ==="
          cat export_presets.cfg
          echo ""
          echo "=== RUNNING EXPORT ==="
          godot --headless --path . --export-debug "Android" builds/agent007.apk 2>&1
          EXITCODE=$?
          echo "EXIT_CODE=$EXITCODE"
          echo ""
          echo "=== SEARCHING FOR APK ==="
          find / -name "*.apk" 2>/dev/null
          echo ""
          echo "=== BUILDS DIR ==="
          ls -la builds/ 2>/dev/null || echo "builds/ missing"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: builds/*.apk
          if-no-files-found: error