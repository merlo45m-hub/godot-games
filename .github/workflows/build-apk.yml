name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install python-for-android cython
          # Check what p4a expects
          python3 -m pythonforandroid.toolchain apk --help 2>&1 | head -3 || true

      - name: Build APK
        run: |
          p4a apk \
            --private agent007/ \
            --package "com.nousresearch.agent007" \
            --name "Agent 007" \
            --version 0.1.0 \
            --bootstrap sdl2 \
            --requirements python3,sdl2,numpy \
            --arch arm64-v8a \
            --permission VIBRATE \
            --window \
            --dist-name agent007 \
            --output builds/ 2>&1 | tail -30
          echo "--- SEARCH FOR APK ---"
          find / -name "*.apk" -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null
          mkdir -p builds
          cp /home/runner/work/godot-games/godot-games/builds/*.apk . 2>/dev/null || true
          cp *.apk builds/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: |
            builds/*.apk
            *.apk
          if-no-files-found: want