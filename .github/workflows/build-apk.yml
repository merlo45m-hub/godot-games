name: Build APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_NDK_HOME: /opt/android-sdk/ndk/25.2.9519653

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android SDK + NDK
        run: |
          sudo apt update -qq && sudo apt install -y -qq openjdk-17-jdk wget unzip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools/
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653" > /dev/null 2>&1
          echo "SDK ready"

      - name: Build APK
        run: |
          pip install python-for-android cython
          mkdir -p builds
          p4a apk \
            --private agent007/ \
            --package "com.nousresearch.agent007" \
            --name "Agent 007" \
            --version 0.1.0 \
            --bootstrap sdl2 \
            --requirements python3,sdl2,numpy \
            --arch arm64-v8a \
            --permission VIBRATE \
            --window \
            --dist-name agent007 \
            --output builds/ 2>&1
          find /opt -name "*.apk" -o -name "*.aab" 2>/dev/null
          find $HOME -name "*.apk" -o -name "*.aab" 2>/dev/null
          ls -la builds/ 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: agent007-apk
          path: |
            builds/*.apk
            builds/*.aab
            *.apk
          if-no-files-found: warn